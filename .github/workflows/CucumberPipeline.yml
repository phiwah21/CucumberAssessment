name: Cucumber Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Run Tests
        run: mvn clean test -Dheadless=true

      - name: Upload Cucumber Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Extents-report
          path: test-output/

      - name: Send Email with the Report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true


          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}


          subject: Cucumber Automation Test Report


          to: phiwah21@gmail.com,email2,email3
          from: ${{ secrets.MAIL_USERNAME }}


          body: |
            Hi Team,
            
            
            Please find attached the latest Extents Automation Report.
            
            
            Execution completed successfully.
            
            
            Regards,
            Group1 and 2 Team
          

          attachments: target/cucumber-report.html
